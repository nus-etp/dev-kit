  <!--
    NUSX wordmark, light/dark adaptive.
    Light: solid black (official "All Black" variant).
    Dark:  white wordmark + neon "X" (official "White_Neon" variant).
    The neon (#e6fe6c) is reserved for dark backgrounds where it reads well;
    on a light background the "X" stays black so it never washes out.
  -->
  <style>
    .nusx-word { fill: #000; }
    .nusx-x { fill: #000; }
    @media (prefers-color-scheme: dark) {
      .nusx-word { fill: #fff; }
      .nusx-x { fill: #e6fe6c; }
    }
  </style>
