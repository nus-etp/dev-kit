name: Sync from upstream

# Mirrors opengovsg/starter-kit@main onto the `upstream` branch of this repo.
# The branch is a verbatim copy of upstream — no merge into `main` happens here.
# Merging `upstream` into `main` is done manually; it need not be conflict-free,
# we rely on manual judgment for that.
#
# Because the mirror includes .github/workflows/*, the default GITHUB_TOKEN
# cannot push it (it lacks the `workflow` scope). We mint a short-lived
# installation token from a GitHub App instead of a fine-grained PAT — App
# tokens auto-rotate every run and never silently expire. The App must be
# installed on this repo with Contents: write and Workflows: write, and its
# credentials stored as the `UPSTREAM_SYNC_APP_ID` and
# `UPSTREAM_SYNC_APP_PRIVATE_KEY` secrets.

on:
  schedule:
    - cron: '0 1 * * 1' # 09:00 SGT every Monday
  workflow_dispatch: {}

permissions:
  contents: write

env:
  UPSTREAM_REMOTE: https://github.com/opengovsg/starter-kit.git
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mint a GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.UPSTREAM_SYNC_APP_ID }}
          private-key: ${{ secrets.UPSTREAM_SYNC_APP_PRIVATE_KEY }}

      - name: Checkout (for origin + auth)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # App token carries `workflow` scope so the push may touch
          # .github/workflows/*.
          token: ${{ steps.app-token.outputs.token }}

      - name: Mirror upstream onto the `upstream` branch
        run: |
          git remote add upstream "$UPSTREAM_REMOTE" 2>/dev/null \
            || git remote set-url upstream "$UPSTREAM_REMOTE"
          git fetch --no-tags upstream "$UPSTREAM_BRANCH"
          # Push the freshly fetched upstream tip verbatim to origin/<TARGET_BRANCH>.
          # --force because the branch is a moving mirror; identical content is a no-op.
          git push --force origin \
            "refs/remotes/upstream/$UPSTREAM_BRANCH:refs/heads/$TARGET_BRANCH"
